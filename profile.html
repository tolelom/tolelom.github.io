<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Required meta tags-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    
    <!-- Bootstrap CSS -->  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">

    <title>Next Letter</title> 
 
    <style>
        html, body {
            width: 100%;
            height: 100%;
        }
        body {
            background-color: lightcyan;
        }
        .container {
            background: lightblue;
        }

        @media (min-width: 768px) {
            .container {
                width: 553px;
            }
        }

        @media (min-width: 992px) {
            .container {
                width: 553px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col text-center" style="margin-top: 10%">
                <img src="http://lorempixel.com/200/200" alt="..." class="img-thumbnail">
            </div>
        </div>
        <div class="row">
            <div class="col m-2 text-center">
                <h1><strong>홍길동</strong></h1>
                <p class="text-justify">나 군대간다 인편 많이 써줘!!!</p>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="input-group">
                    <input type="text" placeholder="관계" class="form-control">
                    <input type="text" placeholder="비밀번호" class="form-control">
                </div>
            </div>
            <div class="col-10">
                <textarea class="form-control" rows="3" style="resize: none;"></textarea>
            </div>
            <div class="col">
                <button class="btn btn-dark w-100">발송</button>
            </div>
        </div>

        <div class="row">
            <div class="col p-2">
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <input type="text" class="form-control" placeholder="관계">
                    </div>
                    <input type="text" class="form-control" placeholder="편지를 입력하세요." aria-label="Recipient's username" aria-describedby="basic-addon2">
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary" type="button">Button</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>


</body>
</html>
