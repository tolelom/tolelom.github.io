<!DOCTYPE html>
<html>
	<head>
		<meta charseet="utf-8" />
		<title>2048</title>

		<link rel="stylesheet" href="style.css" />
		<meta
			name="viewport"
			content="width=device-width, target-densitydpi=160dpi, initial-scale=1.0, maximum-scale=1, user-scalable=no, minimal-ui"
		/>
		
		<style>
			#warp {
				height: 500px;
				margin: 0 auto;
				border: 4px solid black;
			}
			#warp div {
				display: inline-block;
				height: 100px;
			}
			#warp div:first-child {
				background: #f45750;
			}
			#warp div:nth-child(2) {
				background: #40b0f9;
			}
			#warp div:nth-child(3) {
				background: #00d2a5;
			}
			#warp div:nth-child(4) {
				background: #ff884d;
			}
			#warp div:last-child {
				background: #464646;
			}
			@media all and (min-width: 320px) {
				#warp div {
					width: 100%;
				}
			}
			@media all and (min-width: 768px) {
				#warp div {
					width: 50%;
				}
				#warp div:last-child {
				width: 100%;
				}
			}
			
			@media all and (min-width: 1024px) {
				#warp div {
					width: 20%;
				}
				#warp div:last-child {
					width: 20%;
				}
			}
		</style>
	</head>
	
	<body>
		<div id="warp">
			<div></div><div></div><div></div><div></div><div></div>
				
			</div>
		</div>
	</body>
</html>
