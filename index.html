<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Required meta tags-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
    
    <!-- Bootstrap CSS -->  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
    
    <title>Next Letter</title> 
    
    <!-- reset css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            text-decoration: none;
        }
        h1, h2, h3, h4, h5, h6, p {
            font-family: 'Nanum Pen Script', cursive;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 50px auto;
            text-align: center;
        }
        .logo {
            font-size: 60px;
            font-family: 'Jua', sans-serif;
            font-weight: bold; 
        }

        .alert {
            text-align: left;
        }

        .information {
            margin: 0 10%;
        }
        .information p{
            text-align: left;
        }


        a:link {
            color: black;
            text-decoration: none;
        }
        a:visited {
            color: black;
        }
        a:hover {
            color: black;
        }
        a:active {
            color: gray;
        }
    </style>
</head>

<body>
    <div id="warp">
        <header class="header">
            <h1 class="logo">
                <a href="index.html">Next Letter</a>
            </h1>
        </header>
        <div class="alert">
            <div class="alert alert-warning" role="alert">
                부트스트랩을 통한 UI 테스트 중입니다 
            </div>
        </div>
        
        <div class="information">
            <h2>Next Letter는 기존의 더 캠프를 대체해 훈련병들에게 인터넷 편지를 보내주는 서비스입니다.</h2>
            <p>입대 전에 Next Letter에 회원 가입을 하고 자신만의 페이지를 만들어두세요! <br> 친구들은 미리 만들어둔 페이지에 방명록 적듯 댓글형으로 편지를 적기만 하면 인터넷 편지가 보내집니다!</p>
        </div>


        <div class="container">
            <p>인터넷 편지를 보내려는 훈련병의 소속을 선택해주세요.</p>
            <hr/>
    
            <div class="d-grid gap-2 col-6 mx-auto">
                    <button type="button" class="btn btn-success btn-lg btn-block" onclick="location.href='roka.html'">육군</button>
                    <button type="button" class="btn btn-info btn-lg btn-block" disabled>공군</button>
                    <button type="button" class="btn btn-primary btn-lg btn-block"disabled>해군</button>
            </div>
        </div>
    </div>   
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>

</html>
