<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Required meta tags-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
    
    <!-- Bootstrap CSS -->  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
    
    <title>Next Letter-login</title> 
    
    <!-- reset css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0 auto;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans KR", sans-serif;
        }
        a {
            text-decoration: none;
            color: black
        }
        

        .wrap {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 4rem;
            font-family: 'Jua', sans-serif;
            font-weight: bold; 
            text-align: center;
        }

        .login-header {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .login-box {
            width: 50%;
            height: 300px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid black;
            flex-direction: column;
            background: lightgray;
            
        }
        .idForm {
            border-radius: 20px;
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <header class="header">
            <h1 class="logo">
                <a href="index.html">Next Letter</a>
            </h1>
        </header>

        <div class="login-box">
            <p class="login-header">Login</p>
            <form class="loginForm">
                <div class="idForm">
                    <input type="text" name="id" placeholder="ID">
                </div>
                <div class="pwForm">
                    <input type="password" name="password" placeholder="Password">
                </div>
                <button type="button" class="submitBtn" onClick="">로그인</button>
            </form>

            <a href="">비밀번호를 잊으셨나요?</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>
</body>
</html>
